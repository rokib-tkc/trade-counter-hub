<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Advance Picks</title><link rel="stylesheet" href="styles.css"></head><body>
<div id="loginScreen" class="login-screen"><div class="login-card"><div class="brand-mark">MKM</div><h1>Advance Picks</h1><p>Trade Counter collection and picking manager</p><form id="loginForm"><label>Name<input id="loginName" autocomplete="username" required></label><label>Access Key<input id="loginKey" type="password" autocomplete="current-password" required></label><button class="primary" type="submit">Sign in</button><div id="loginError" class="error"></div></form></div></div>
<div id="app" class="app hidden">
<aside class="sidebar"><div class="logo-row"><div class="brand-mark small">MKM</div><span>TRADE COUNTER HUB</span></div><nav>
<button data-page="dashboard">⌂ <span>Dashboard</span></button><button class="active" data-page="advance">▣ <span>Advance Picks</span></button><button data-page="small">▦ <span>Small Orders</span></button><button data-page="board">⇆ <span>Picking Board</span></button><button data-page="workload">♙ <span>Team Workload</span></button><button data-page="reports">▥ <span>Reports</span></button><button data-page="settings">⚙ <span>Settings</span></button></nav><div class="side-bottom"><button id="logoutBtn">↪ <span>Sign out</span></button></div></aside>
<main><header class="topbar"><div><h1 id="pageTitle">Advance Picks</h1><p id="pageSubtitle">View and manage collection bookings and picking schedules</p></div><div class="top-actions"><div class="search-wrap">⌕<input id="searchInput" placeholder="Search orders or customers"></div><button id="notificationBtn" class="icon-btn">♢<span id="notificationBadge" class="badge hidden">0</span></button><div id="userChip" class="user-chip"><div><strong id="userName"></strong><small id="userRole"></small></div><div id="userAvatar" class="avatar"></div></div></div></header>
<section id="mainContent">
<div id="plannerControls" class="toolbar"><div class="date-nav"><button id="todayBtn">Today</button><button id="prevBtn">‹</button><button id="nextBtn">›</button><strong id="dateLabel"></strong></div><div class="toolbar-right"><select id="viewMode"><option value="week">Week view</option><option value="day">Day view</option></select><button id="filterBtn">☷ Filters</button><button id="refreshBtn">↻ Refresh</button><button id="newBookingBtn" class="primary">＋ New Booking</button></div></div>
<div id="filterPanel" class="filter-panel hidden"><label>Status<select id="statusFilter"><option value="">All statuses</option></select></label><label>Picker<select id="pickerFilter"><option value="">All pickers</option></select></label><label>Priority<select id="priorityFilter"><option value="">All priorities</option><option>Normal</option><option>High</option><option>Urgent</option></select></label><button id="clearFilters">Clear filters</button></div>
<div id="stats" class="stats"></div>
<div id="pageBody"></div>
</section></main></div>

<div id="notificationPanel" class="drawer hidden"><div class="drawer-head"><h2>Notifications</h2><button data-close="notificationPanel">×</button></div><div id="notificationList"></div></div>
<div id="orderPanel" class="order-panel hidden"><div class="drawer-head"><div><h2 id="orderPanelTitle"></h2><span id="orderPanelStatus"></span></div><button data-close="orderPanel">×</button></div><div class="tabs"><button class="active" data-order-tab="details">Details</button><button data-order-tab="notes">Notes</button><button data-order-tab="activity">Activity</button></div><div id="orderPanelContent"></div><div class="panel-actions"><button id="panelEdit">Edit Booking</button><button id="panelWaiting">Customer Waiting</button><button id="panelReady">Mark as Ready</button><button id="panelCollected" class="primary">Collected</button></div></div>

<div id="bookingModal" class="modal hidden"><div class="modal-card large"><div class="modal-head"><div><h2 id="modalTitle">New Booking</h2><p>Enter the customer and collection details below.</p></div><button data-close="bookingModal">×</button></div><form id="bookingForm"><input id="bookingId" type="hidden"><div class="form-grid">
<label>Order Number<input id="orderNumber" required></label><label>Customer<input id="customer" required></label><label>Booking Type<select id="bookingType" required><option>Advance Large Order</option><option>Small Order</option><option>Walk in</option></select></label><label>Number of Items<input id="itemCount" type="number" min="0"></label>
<label>Collection Date<input id="collectionDate" type="date" required></label><label>Collection Time<select id="collectionTime"></select></label><label>Assigned Picker<select id="assignedPicker"><option value="">Unassigned</option></select></label><label>Priority<select id="priority"><option>Normal</option><option>High</option><option>Urgent</option></select></label>
<label>Payment Type<select id="paymentType"></select></label><label>Payment Status<select id="paymentStatus"><option>Paid</option><option>Payment Required</option></select></label><label>Account Status<select id="accountStatus"><option>Released</option><option>Held</option></select></label><label>Pick Status<select id="pickStatus"><option>Waiting</option><option>Picking</option><option>Ready</option><option>Problem</option><option>Cancelled</option></select></label>
<label>Collection Status<select id="collectionStatus"><option value="">Not arrived</option><option>Customer Waiting</option><option>Collected</option></select></label><label>Booked by (Sales Team Member)<input id="bookedBy"></label><label>Order Value ex VAT (£)<input id="orderValueExVAT" type="number" min="0" step="0.01"></label><label>Order Value inc VAT (£)<input id="orderValueIncVAT" disabled></label>
</div><fieldset><legend>Order Requirements</legend><div class="checks"><label><input id="drillingRequired" type="checkbox">Drilling Required</label><label><input id="parkwayItems" type="checkbox">Parkway Items</label><label><input id="airPicks" type="checkbox">Air Picks</label><label><input id="osItems" type="checkbox">O/S Items</label><label><input id="paintedOrder" type="checkbox">Painted Order</label><label><input id="madeToMeasure" type="checkbox">Made to Measure</label></div></fieldset><label>Notes<textarea id="notes" rows="4"></textarea></label><div class="modal-actions"><button type="button" id="deleteBookingBtn" class="danger hidden">Delete</button><span></span><button type="button" data-close="bookingModal">Cancel</button><button class="primary" type="submit">Save Booking</button></div></form></div></div>

<div id="settingsModal" class="modal hidden"><div class="modal-card large"><div class="modal-head"><h2>Settings</h2><button data-close="settingsModal">×</button></div><div id="settingsContent"></div></div></div>
<div id="toast" class="toast hidden"></div><script src="config.js"></script><script src="app.js"></script></body></html>
